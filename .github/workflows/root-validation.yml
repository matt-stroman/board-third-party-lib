name: Root Validation

on:
  push:
    branches:
      - main
      - feat/cloudflare-supabase-workers-conversion
  pull_request:
    branches:
      - main
      - feat/cloudflare-supabase-workers-conversion

permissions:
  contents: read

concurrency:
  group: root-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-tooling:
    name: Validate Root Tooling
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show submodule status
        run: git submodule status --recursive

      - name: Compile root developer CLI
        run: python -m py_compile scripts/dev.py

      - name: Run root developer automation tests
        run: python -m unittest discover -s tests/root_cli -p "test_*.py"

  contract-smoke:
    name: Contract Smoke
    runs-on: ubuntu-latest
    needs: root-tooling

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run contract smoke tests
        run: python ./scripts/dev.py contract-smoke --start-workers

  staging-dry-run:
    name: Staging Dry Run
    runs-on: ubuntu-latest
    needs: root-tooling

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate staging deployment flow
        run: python ./scripts/dev.py deploy-staging --dry-run
