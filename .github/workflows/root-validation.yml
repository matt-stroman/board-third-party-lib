name: Root Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: root-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  root-cli-smoke:
    name: Root CLI Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./backend/global.json

      - name: Show submodule status
        run: git submodule status --recursive

      - name: Smoke-check root developer CLI
        run: |
          python --version
          python ./scripts/dev.py --help

  api-lint:
    name: API Tests - Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run API lint
        run: python ./scripts/dev.py api-lint

  api-contract:
    name: API Tests - Contract
    runs-on: ubuntu-latest
    needs: api-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./backend/global.json

      - name: Restore backend solution
        run: dotnet restore ./backend/Board.ThirdPartyLibrary.Backend.sln

      - name: Install Postman CLI
        run: npm install -g postman-cli@1.29.5

      - name: Run API contract tests
        env:
          ConnectionStrings__BoardLibrary: Host=localhost;Port=5432;Database=board_tpl;Username=board_tpl_user;Password=board_tpl_password;SSL Mode=Require;Trust Server Certificate=true
        run: python ./scripts/dev.py api-test --start-backend --skip-lint

  backend-unit-tests:
    name: Backend Tests - Unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./backend/global.json

      - name: Run backend unit tests
        run: python ./scripts/dev.py test --skip-integration

  backend-integration-tests:
    name: Backend Tests - Integration
    runs-on: ubuntu-latest
    needs: backend-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./backend/global.json

      - name: Restore backend solution
        run: dotnet restore ./backend/Board.ThirdPartyLibrary.Backend.sln

      - name: Run backend integration tests
        run: dotnet test ./backend/tests/Board.ThirdPartyLibrary.Api.IntegrationTests/Board.ThirdPartyLibrary.Api.IntegrationTests.csproj --no-restore --filter "Category=Integration"

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./backend/global.json

      - name: Run frontend tests
        run: dotnet test ./frontend/Board.ThirdPartyLibrary.Frontend.slnx
