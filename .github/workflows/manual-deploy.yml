name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target environment"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      force:
        description: "Rerun every deploy stage from scratch"
        required: true
        type: boolean
        default: false
      upgrade:
        description: "Allow a new source fingerprint to replace the saved deploy state"
        required: true
        type: boolean
        default: false
      preflight_only:
        description: "Run only provider/config preflight checks"
        required: true
        type: boolean
        default: false
      dry_run_only:
        description: "Run preflight plus dry-run validation without publishing"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: manual-deploy-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.target }}
    env:
      BOARD_ENTHUSIASTS_APP_ENV: ${{ inputs.target }}
      BOARD_ENTHUSIASTS_SPA_BASE_URL: ${{ vars.BOARD_ENTHUSIASTS_SPA_BASE_URL }}
      BOARD_ENTHUSIASTS_WORKERS_BASE_URL: ${{ vars.BOARD_ENTHUSIASTS_WORKERS_BASE_URL }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_AVATARS_BUCKET: ${{ vars.SUPABASE_AVATARS_BUCKET }}
      SUPABASE_CARD_IMAGES_BUCKET: ${{ vars.SUPABASE_CARD_IMAGES_BUCKET }}
      SUPABASE_HERO_IMAGES_BUCKET: ${{ vars.SUPABASE_HERO_IMAGES_BUCKET }}
      SUPABASE_LOGO_IMAGES_BUCKET: ${{ vars.SUPABASE_LOGO_IMAGES_BUCKET }}
      SUPABASE_AUTH_DISCORD_CLIENT_ID: ${{ vars.SUPABASE_AUTH_DISCORD_CLIENT_ID }}
      SUPABASE_AUTH_DISCORD_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_DISCORD_CLIENT_SECRET }}
      SUPABASE_AUTH_GITHUB_CLIENT_ID: ${{ vars.SUPABASE_AUTH_GITHUB_CLIENT_ID }}
      SUPABASE_AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_GITHUB_CLIENT_SECRET }}
      SUPABASE_AUTH_GOOGLE_CLIENT_ID: ${{ vars.SUPABASE_AUTH_GOOGLE_CLIENT_ID }}
      SUPABASE_AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_GOOGLE_CLIENT_SECRET }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_SIGNUPS_LIST_ID: ${{ vars.BREVO_SIGNUPS_LIST_ID }}
      ALLOWED_WEB_ORIGINS: ${{ vars.ALLOWED_WEB_ORIGINS }}
      SUPPORT_REPORT_RECIPIENT: ${{ vars.SUPPORT_REPORT_RECIPIENT }}
      SUPPORT_REPORT_SENDER_EMAIL: ${{ vars.SUPPORT_REPORT_SENDER_EMAIL }}
      SUPPORT_REPORT_SENDER_NAME: ${{ vars.SUPPORT_REPORT_SENDER_NAME }}
      DEPLOY_SMOKE_PLAYER_EMAIL: ${{ vars.DEPLOY_SMOKE_PLAYER_EMAIL }}
      DEPLOY_SMOKE_DEVELOPER_EMAIL: ${{ vars.DEPLOY_SMOKE_DEVELOPER_EMAIL }}
      DEPLOY_SMOKE_MODERATOR_EMAIL: ${{ vars.DEPLOY_SMOKE_MODERATOR_EMAIL }}
      DEPLOY_SMOKE_SECRET: ${{ secrets.DEPLOY_SMOKE_SECRET }}
      DEPLOY_SMOKE_USER_PASSWORD: ${{ secrets.DEPLOY_SMOKE_USER_PASSWORD }}
      VITE_LANDING_MODE: ${{ vars.VITE_LANDING_MODE }}
      DEPLOY_SOURCE_BRANCH: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show submodule status
        run: git submodule status --recursive

      - name: Write root-managed deploy env file
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          target = os.environ["BOARD_ENTHUSIASTS_APP_ENV"].strip().lower()
          if target not in {"staging", "production"}:
              raise SystemExit(f"Unsupported deploy target: {target}")

          env_path = Path("config/.env.staging" if target == "staging" else "config/.env")
          env_path.parent.mkdir(parents=True, exist_ok=True)

          ordered_keys = [
              "BOARD_ENTHUSIASTS_APP_ENV",
              "BOARD_ENTHUSIASTS_SPA_BASE_URL",
              "BOARD_ENTHUSIASTS_WORKERS_BASE_URL",
              "SUPABASE_PROJECT_REF",
              "SUPABASE_URL",
              "SUPABASE_PUBLISHABLE_KEY",
              "SUPABASE_SECRET_KEY",
              "SUPABASE_DB_PASSWORD",
              "SUPABASE_ACCESS_TOKEN",
              "SUPABASE_AVATARS_BUCKET",
              "SUPABASE_CARD_IMAGES_BUCKET",
              "SUPABASE_HERO_IMAGES_BUCKET",
              "SUPABASE_LOGO_IMAGES_BUCKET",
              "SUPABASE_AUTH_DISCORD_CLIENT_ID",
              "SUPABASE_AUTH_DISCORD_CLIENT_SECRET",
              "SUPABASE_AUTH_GITHUB_CLIENT_ID",
              "SUPABASE_AUTH_GITHUB_CLIENT_SECRET",
              "SUPABASE_AUTH_GOOGLE_CLIENT_ID",
              "SUPABASE_AUTH_GOOGLE_CLIENT_SECRET",
              "CLOUDFLARE_ACCOUNT_ID",
              "CLOUDFLARE_API_TOKEN",
              "VITE_TURNSTILE_SITE_KEY",
              "TURNSTILE_SECRET_KEY",
              "BREVO_API_KEY",
              "BREVO_SIGNUPS_LIST_ID",
              "ALLOWED_WEB_ORIGINS",
              "SUPPORT_REPORT_RECIPIENT",
              "SUPPORT_REPORT_SENDER_EMAIL",
              "SUPPORT_REPORT_SENDER_NAME",
              "DEPLOY_SMOKE_PLAYER_EMAIL",
              "DEPLOY_SMOKE_DEVELOPER_EMAIL",
              "DEPLOY_SMOKE_MODERATOR_EMAIL",
              "DEPLOY_SMOKE_SECRET",
              "DEPLOY_SMOKE_USER_PASSWORD",
              "VITE_LANDING_MODE",
          ]

          lines = [f"{key}={os.environ.get(key, '')}" for key in ordered_keys]
          env_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote deploy environment file: {env_path}")
          PY

      - name: Run root deploy workflow
        run: |
          args=(deploy)
          if [[ "${{ inputs.target }}" == "staging" ]]; then
            args+=(--staging)
          fi
          if [[ "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "${{ inputs.upgrade }}" == "true" ]]; then
            args+=(--upgrade)
          fi
          if [[ "${{ inputs.preflight_only }}" == "true" ]]; then
            args+=(--preflight-only)
          fi
          if [[ "${{ inputs.dry_run_only }}" == "true" ]]; then
            args+=(--dry-run-only)
          fi
          if [[ -n "${DEPLOY_SOURCE_BRANCH}" ]]; then
            args+=(--source-branch "${DEPLOY_SOURCE_BRANCH}")
          fi
          python ./scripts/dev.py "${args[@]}"

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ inputs.target }}
          path: .dev-cli-logs
          if-no-files-found: ignore
